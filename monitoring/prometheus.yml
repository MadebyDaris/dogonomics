global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'dogonomics'
    metrics_path: /metrics
    static_configs:
      - targets: ['dogonomics:8080']

  # ONNX service is optional; this target is down unless --profile onnx is enabled.
  - job_name: 'dogonomics_onnx'
    metrics_path: /metrics
    static_configs:
      - targets: ['dogonomics-onnx:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
